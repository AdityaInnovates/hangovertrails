services:
  postgres:
    image: postgres:16-alpine
    container_name: arunachal-tourism-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arunachal_tourism
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arunachal_tourism"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: